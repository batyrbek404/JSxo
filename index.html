<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <title>Крестики-нолики</title>
  <style>
    body {
      font-family: Arial;
      text-align: center;
      margin-top: 50px;
    }
    .board {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      gap: 5px;
      justify-content: center;
    }
    .cell {
      width: 100px;
      height: 100px;
      font-size: 40px;
      cursor: pointer;
    }
  </style>
</head>
<body>

<h1>Крестики-нолики</h1>
<div class="board" id="board"></div>
<h2 id="status">Ход: X</h2>
<button onclick="restart()">Перезапуск</button>

<script>
  const board = document.getElementById("board");
  const status = document.getElementById("status");

  let cells = ["", "", "", "", "", "", "", "", ""];
  let currentPlayer = "X";
  let gameActive = true;

  function createBoard() {
    board.innerHTML = "";
    cells.forEach((cell, index) => {
      const div = document.createElement("div");
      div.classList.add("cell");
      div.innerText = cell;
      div.addEventListener("click", () => handleClick(index));
      board.appendChild(div);
    });
  }

  function handleClick(index) {
    if (cells[index] !== "" || !gameActive) return;

    cells[index] = currentPlayer;
    createBoard();
    checkWinner();

    currentPlayer = currentPlayer === "X" ? "O" : "X";
    status.innerText = "Ход: " + currentPlayer;
  }

  function checkWinner() {
    const wins = [
      [0,1,2],[3,4,5],[6,7,8],
      [0,3,6],[1,4,7],[2,5,8],
      [0,4,8],[2,4,6]
    ];

    for (let combo of wins) {
      const [a, b, c] = combo;
      if (cells[a] && cells[a] === cells[b] && cells[a] === cells[c]) {
        status.innerText = "Победил: " + cells[a];
        gameActive = false;
        return;
      }
    }

    if (!cells.includes("")) {
      status.innerText = "Ничья!";
      gameActive = false;
    }
  }

  function restart() {
    cells = ["", "", "", "", "", "", "", "", ""];
    currentPlayer = "X";
    gameActive = true;
    status.innerText = "Ход: X";
    createBoard();
  }

  createBoard();
</script>

</body>
</html>
