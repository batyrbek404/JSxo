<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Крестики-нолики</title>
    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: sans-serif;
            background: #f5f5f3;
            display: flex;
            align-items: flex-start;
            justify-content: center;
            min-height: 100vh;
            padding: 2rem 1rem;
            color: #1a1a1a;
        }

        /* ── layout ── */
        .page {
            display: flex;
            gap: 20px;
            align-items: flex-start;
            width: 100%;
            max-width: 740px;
        }

        .container {
            background: #fff;
            border-radius: 16px;
            border: 1px solid #e0ddd5;
            padding: 2rem;
            width: 340px;
            flex-shrink: 0;
            position: relative;
            overflow: hidden;
        }

        /* confetti canvas — поверх всей карточки */
        #confetti-canvas {
            position: absolute;
            top: 0; left: 0;
            width: 100%; height: 100%;
            pointer-events: none;
            z-index: 10;
        }

        h1 {
            text-align: center;
            font-size: 22px;
            font-weight: 500;
            margin-bottom: 1.5rem;
        }

        /* ── mode buttons ── */
        .mode-row {
            display: flex;
            gap: 8px;
            justify-content: center;
            margin-bottom: 1.25rem;
        }
        .mode-btn {
            padding: 6px 16px;
            border-radius: 8px;
            border: 1px solid #ccc;
            background: transparent;
            font-size: 13px;
            cursor: pointer;
            transition: background 0.15s;
        }
        .mode-btn:hover  { background: #f0eff8; }
        .mode-btn.active { background: #eeedfe; color: #534ab7; border-color: #7f77dd; }

        /* ── score cards ── */
        .score-row {
            display: flex;
            justify-content: center;
            gap: 16px;
            margin-bottom: 1rem;
        }
        .score-card {
            background: #f5f5f3;
            border: 1px solid #e0ddd5;
            border-radius: 8px;
            padding: 8px 20px;
            text-align: center;
            min-width: 72px;
            transition: border-color 0.2s;
        }
        .score-card.active-turn { border-color: #7f77dd; }
        .score-card .label { font-size: 12px; color: #888; margin-bottom: 2px; }
        .score-card .val   { font-size: 22px; font-weight: 500; }
        .sc-x .val { color: #534ab7; }
        .sc-o .val { color: #0f6e56; }
        .sc-d .val { color: #888; }

        /* ── status ── */
        .status {
            text-align: center;
            font-size: 15px;
            color: #555;
            min-height: 26px;
            margin-bottom: 0.75rem;
        }
        .winner-msg { font-size: 18px; font-weight: 500; color: #1a1a1a; }

        /* ── board ── */
        .board {
            display: grid;
            grid-template-columns: repeat(3, 100px);
            gap: 8px;
            margin: 0 auto 1.5rem;
            width: fit-content;
        }
        .cell {
            width: 100px;
            height: 100px;
            background: #f5f5f3;
            border: 1px solid #ccc;
            border-radius: 8px;
            font-size: 44px;
            font-weight: 400;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s, transform 0.1s;
            user-select: none;
            overflow: hidden;
        }
        .cell:hover:not(.taken) { background: #fff; transform: scale(1.04); }
        .cell.taken { cursor: default; }
        .cell.x     { color: #534ab7; }
        .cell.o     { color: #0f6e56; }
        .cell.win   { background: #eeedfe; border-color: #7f77dd; }

        /* ── 1. анимация появления символа ── */
        @keyframes pop-in {
            0%   { opacity: 0; transform: scale(0.15) rotate(-20deg); }
            55%  { opacity: 1; transform: scale(1.22) rotate(5deg);   }
            75%  { transform: scale(0.9) rotate(-3deg); }
            100% { opacity: 1; transform: scale(1) rotate(0deg);      }
        }
        .cell-symbol {
            display: inline-block;
            animation: pop-in 0.38s cubic-bezier(0.34, 1.56, 0.64, 1) both;
        }

        /* ── buttons ── */
        .btn-row { display: flex; gap: 10px; justify-content: center; }
        button {
            padding: 8px 20px;
            border-radius: 8px;
            border: 1px solid #ccc;
            background: transparent;
            color: #1a1a1a;
            font-size: 14px;
            cursor: pointer;
            transition: background 0.15s;
        }
        button:hover { background: #f5f5f3; }
        button.primary { border-color: #7f77dd; color: #534ab7; }
        button.primary:hover { background: #eeedfe; }

        /* ── 3. история партий ── */
        .history-panel {
            flex: 1;
            background: #fff;
            border-radius: 16px;
            border: 1px solid #e0ddd5;
            padding: 1.5rem;
            min-width: 0;
        }
        .history-panel h2 {
            font-size: 15px;
            font-weight: 500;
            margin-bottom: 1rem;
            color: #555;
        }
        .history-empty {
            font-size: 13px;
            color: #aaa;
            text-align: center;
            padding: 2rem 0;
        }
        .history-list { list-style: none; }
        .history-item {
            display: flex;
            align-items: center;
            gap: 10px;
            padding: 8px 0;
            border-bottom: 1px solid #f0ede8;
            font-size: 13px;
            color: #555;
        }
        .history-item:last-child { border-bottom: none; }
        .h-num   { color: #bbb; min-width: 18px; text-align: right; font-size: 12px; }
        .h-badge {
            font-size: 11px; font-weight: 500;
            padding: 2px 8px; border-radius: 20px; white-space: nowrap;
        }
        .h-badge.win-x { background: #eeedfe; color: #534ab7; }
        .h-badge.win-o { background: #e1f5ee; color: #0f6e56; }
        .h-badge.draw  { background: #f0ede8; color: #888; }
        .h-moves { color: #aaa; font-size: 12px; margin-left: auto; }
    </style>
</head>
<body>

<div class="page">

    <!-- ── главная карточка ── -->
    <div class="container">
        <canvas id="confetti-canvas"></canvas>

        <h1>Крестики-нолики</h1>

        <div class="mode-row">
            <button class="mode-btn" id="btn2p" onclick="setMode('2p')">Два игрока</button>
            <button class="mode-btn active" id="btnAI" onclick="setMode('ai')">Против ИИ</button>
        </div>

        <div class="score-row">
            <div class="score-card sc-x active-turn" id="sc-x">
                <div class="label">✕ Игрок X</div>
                <div class="val" id="val-x">0</div>
            </div>
            <div class="score-card sc-d">
                <div class="label">Ничья</div>
                <div class="val" id="val-d">0</div>
            </div>
            <div class="score-card sc-o" id="sc-o">
                <div class="label" id="o-label">🤖 ИИ (O)</div>
                <div class="val" id="val-o">0</div>
            </div>
        </div>

        <div class="status" id="status">Ход: X</div>
        <div class="board" id="board"></div>

        <div class="btn-row">
            <button class="primary" onclick="newGame()">Новая игра</button>
            <button onclick="resetAll()">Сбросить всё</button>
        </div>
    </div>

    <!-- ── 3. История партий ── -->
    <div class="history-panel">
        <h2>История партий</h2>
        <div id="history-body"><p class="history-empty">Партий ещё не было</p></div>
    </div>

</div>

<script>
    /* ═══════════════════════════════════
       Константы
    ═══════════════════════════════════ */
    const WINS = [
        [0,1,2],[3,4,5],[6,7,8],
        [0,3,6],[1,4,7],[2,5,8],
        [0,4,8],[2,4,6]
    ];
    const LS_SCORES  = 'ttt_scores';
    const LS_HISTORY = 'ttt_history';

    /* ═══════════════════════════════════
       Состояние
    ═══════════════════════════════════ */
    let board, current, gameOver, mode, scores, history, moveCount;
    let prevBoard = Array(9).fill(null);

    /* ═══════════════════════════════════
       4. localStorage
    ═══════════════════════════════════ */
    function loadStorage() {
        try { scores  = JSON.parse(localStorage.getItem(LS_SCORES))  || { X:0, O:0, D:0 }; }
        catch { scores = { X:0, O:0, D:0 }; }

        try { history = JSON.parse(localStorage.getItem(LS_HISTORY)) || []; }
        catch { history = []; }
    }

    function saveStorage() {
        localStorage.setItem(LS_SCORES,  JSON.stringify(scores));
        localStorage.setItem(LS_HISTORY, JSON.stringify(history));
    }

    /* ═══════════════════════════════════
       Инициализация
    ═══════════════════════════════════ */
    function init() {
        loadStorage();
        mode      = 'ai';
        board     = Array(9).fill(null);
        prevBoard = Array(9).fill(null);
        current   = 'X';
        gameOver  = false;
        moveCount = 0;
        updateScore();
        renderHistory();
        buildBoard();
    }

    function setMode(m) {
        mode = m;
        document.getElementById('btn2p').className = 'mode-btn' + (m === '2p' ? ' active' : '');
        document.getElementById('btnAI').className = 'mode-btn' + (m === 'ai'  ? ' active' : '');
        document.getElementById('o-label').textContent = m === 'ai' ? '🤖 ИИ (O)' : '○ Игрок O';
        newGame();
    }

    function newGame() {
        board     = Array(9).fill(null);
        prevBoard = Array(9).fill(null);
        current   = 'X';
        gameOver  = false;
        moveCount = 0;
        document.getElementById('status').textContent = 'Ход: X';
        buildBoard();
    }

    function resetAll() {
        scores  = { X:0, O:0, D:0 };
        history = [];
        saveStorage();
        updateScore();
        renderHistory();
        newGame();
    }

    /* ═══════════════════════════════════
       Логика хода
    ═══════════════════════════════════ */
    function move(i) {
        if (board[i] || gameOver) return;
        board[i] = current;
        moveCount++;
        renderCell(i, true);

        const w = checkWin(board);
        if (w) {
            gameOver = true;
            scores[current]++;

            const name = current === 'X'
                ? '✕ Игрок X'
                : (mode === 'ai' ? '🤖 ИИ' : '○ Игрок O');

            document.getElementById('status').innerHTML =
                `<span class="winner-msg">${name} побеждает!</span>`;

            highlightWin();
            launchConfetti(current);             // 2. Конфетти
            addHistory(current === 'X' ? 'win-x' : 'win-o', name, moveCount);
            updateScore();
            saveStorage();
            updateTurnHighlight();
            return;
        }

        if (board.every(v => v)) {
            gameOver = true;
            scores.D++;
            document.getElementById('status').textContent = 'Ничья!';
            addHistory('draw', 'Ничья', moveCount);
            updateScore();
            saveStorage();
            updateTurnHighlight();
            return;
        }

        current = current === 'X' ? 'O' : 'X';
        document.getElementById('status').textContent =
            `Ход: ${current === 'X' ? '✕ X' : '○ O'}`;
        updateTurnHighlight();

        if (mode === 'ai' && current === 'O' && !gameOver)
            setTimeout(aiMove, 350);
    }

    /* ═══════════════════════════════════
       ИИ — minimax
    ═══════════════════════════════════ */
    function aiMove() {
        const best = minimax(board, 'O');
        move(best.idx);
    }

    function minimax(b, player, depth = 0) {
        const w = checkWin(b);
        if (w === 'O') return { score: 10 - depth };
        if (w === 'X') return { score: depth - 10 };
        const empty = b.map((v,i) => v ? null : i).filter(v => v !== null);
        if (!empty.length) return { score: 0 };
        const results = empty.map(i => {
            const nb = [...b]; nb[i] = player;
            const r = minimax(nb, player === 'O' ? 'X' : 'O', depth + 1);
            return { idx: i, score: r.score };
        });
        return player === 'O'
            ? results.reduce((a,b) => b.score > a.score ? b : a)
            : results.reduce((a,b) => b.score < a.score ? b : a);
    }

    /* ═══════════════════════════════════
       Вспомогательные
    ═══════════════════════════════════ */
    function checkWin(b) {
        for (const [a,c,d] of WINS)
            if (b[a] && b[a] === b[c] && b[c] === b[d]) return b[a];
        return null;
    }
    function getWinCombo() {
        for (const combo of WINS) {
            const [a,c,d] = combo;
            if (board[a] && board[a] === board[c] && board[c] === board[d]) return combo;
        }
        return null;
    }

    /* ═══════════════════════════════════
       Рендер доски
    ═══════════════════════════════════ */
    function buildBoard() {
        const container = document.getElementById('board');
        container.innerHTML = '';
        board.forEach((v, i) => {
            const cell = document.createElement('div');
            cell.id = 'cell-' + i;
            cell.className = 'cell' + (v ? ' taken ' + v.toLowerCase() : '');
            if (v) {
                const span = document.createElement('span');
                span.className = 'cell-symbol';
                span.textContent = v === 'X' ? '✕' : '○';
                cell.appendChild(span);
            }
            if (!v && !gameOver) cell.onclick = () => move(i);
            container.appendChild(cell);
        });
        prevBoard = [...board];
        updateTurnHighlight();
    }

    /* Обновляем только одну ячейку (с анимацией) */
    function renderCell(i, animate) {
        const v    = board[i];
        const cell = document.getElementById('cell-' + i);
        if (!cell) return;

        cell.className = 'cell taken ' + v.toLowerCase();
        cell.onclick   = null;

        const span = document.createElement('span');
        span.className = animate ? 'cell-symbol' : '';   // 1. анимация только для новых
        span.textContent = v === 'X' ? '✕' : '○';
        cell.innerHTML = '';
        cell.appendChild(span);
        prevBoard[i] = v;
    }

    function highlightWin() {
        const combo = getWinCombo();
        if (!combo) return;
        combo.forEach(i => {
            const cell = document.getElementById('cell-' + i);
            if (cell) cell.classList.add('win');
        });
    }

    function updateTurnHighlight() {
        document.getElementById('sc-x').className =
            'score-card sc-x' + (!gameOver && current === 'X' ? ' active-turn' : '');
        document.getElementById('sc-o').className =
            'score-card sc-o' + (!gameOver && current === 'O' ? ' active-turn' : '');
    }

    function updateScore() {
        document.getElementById('val-x').textContent = scores.X;
        document.getElementById('val-o').textContent = scores.O;
        document.getElementById('val-d').textContent = scores.D;
    }

    /* ═══════════════════════════════════
       3. История партий
    ═══════════════════════════════════ */
    function addHistory(type, label, moves) {
        history.unshift({ type, label, moves });
        if (history.length > 20) history.pop();
        renderHistory();
    }

    function renderHistory() {
        const body = document.getElementById('history-body');
        if (!history.length) {
            body.innerHTML = '<p class="history-empty">Партий ещё не было</p>';
            return;
        }
        const ul = document.createElement('ul');
        ul.className = 'history-list';
        history.forEach((item, idx) => {
            const li = document.createElement('li');
            li.className = 'history-item';
            li.innerHTML =
                `<span class="h-num">${history.length - idx}</span>` +
                `<span class="h-badge ${item.type}">${item.label}</span>` +
                `<span class="h-moves">${item.moves} ход${plural(item.moves)}</span>`;
            ul.appendChild(li);
        });
        body.innerHTML = '';
        body.appendChild(ul);
    }

    function plural(n) {
        if (n % 10 === 1 && n % 100 !== 11) return '';
        if ([2,3,4].includes(n % 10) && ![12,13,14].includes(n % 100)) return 'а';
        return 'ов';
    }

    /* ═══════════════════════════════════
       2. Конфетти (Canvas API)
    ═══════════════════════════════════ */
    let confettiAnim = null;

    function launchConfetti(winner) {
        const canvas = document.getElementById('confetti-canvas');
        const ctx    = canvas.getContext('2d');
        const rect   = canvas.parentElement.getBoundingClientRect();
        canvas.width  = rect.width;
        canvas.height = rect.height;

        // X стреляет слева, O — справа
        const fromLeft = winner === 'X';
        const originX  = fromLeft ? 0 : canvas.width;

        const palette = {
            X: ['#534ab7','#7f77dd','#afa9ec','#eeedfe','#ffd700','#fff'],
            O: ['#0f6e56','#1d9e75','#5dcaa5','#e1f5ee','#ffd700','#fff']
        };
        const colors = palette[winner];

        const particles = Array.from({ length: 90 }, () => ({
            x:     originX,
            y:     canvas.height * (0.15 + Math.random() * 0.7),
            vx:    (fromLeft ? 1 : -1) * (4 + Math.random() * 7),
            vy:    -5 + Math.random() * 10,
            ay:    0.2,
            size:  5 + Math.random() * 7,
            color: colors[Math.floor(Math.random() * colors.length)],
            rot:   Math.random() * Math.PI * 2,
            rotV:  (Math.random() - 0.5) * 0.3,
            life:  1,
            decay: 0.011 + Math.random() * 0.009
        }));

        if (confettiAnim) cancelAnimationFrame(confettiAnim);

        (function draw() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            let alive = false;
            for (const p of particles) {
                if (p.life <= 0) continue;
                alive = true;
                p.vy += p.ay;
                p.x  += p.vx;
                p.y  += p.vy;
                p.rot += p.rotV;
                p.life -= p.decay;
                ctx.save();
                ctx.globalAlpha = Math.max(0, p.life);
                ctx.translate(p.x, p.y);
                ctx.rotate(p.rot);
                ctx.fillStyle = p.color;
                ctx.fillRect(-p.size / 2, -p.size / 4, p.size, p.size / 2);
                ctx.restore();
            }
            if (alive) confettiAnim = requestAnimationFrame(draw);
            else { ctx.clearRect(0, 0, canvas.width, canvas.height); confettiAnim = null; }
        })();
    }

    /* ═══════════════════════════════════
       Старт
    ═══════════════════════════════════ */
    init();
</script>
</body>
</html>
